services:
  digest-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digest-bot
    env_file:
      - .env
    environment:
      OBSIDIAN_VAULT_PATH: /app/obsidian-vault
    command:
      [
        "--sources",
        "config/sources.yaml",
        "--sources-overlay",
        "data/sources.local.yaml",
        "--profile",
        "config/profile.yaml",
        "--profile-overlay",
        "data/profile.local.yaml",
        "--db",
        "digest-live.db",
        "bot",
      ]
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.runtime:/app/.runtime
      - ./obsidian-vault:/app/obsidian-vault
      - ./digest-live.db:/app/digest-live.db
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "/app/bin/digest",
          "bot-health-check",
          "--health-path",
          ".runtime/bot-health.json",
          "--stale-seconds",
          "120",
          "--max-error-streak",
          "8",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
  digest-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digest-scheduler
    env_file:
      - .env
    environment:
      OBSIDIAN_VAULT_PATH: /app/obsidian-vault
    command:
      [
        "--sources",
        "config/sources.yaml",
        "--sources-overlay",
        "data/sources.local.yaml",
        "--profile",
        "config/profile.yaml",
        "--profile-overlay",
        "data/profile.local.yaml",
        "--db",
        "digest-live.db",
        "web",
        "--host",
        "0.0.0.0",
        "--port",
        "8787",
      ]
    ports:
      - "${DIGEST_WEB_PORT:-8787}:8787"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.runtime:/app/.runtime
      - ./obsidian-vault:/app/obsidian-vault
      - ./digest-live.db:/app/digest-live.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
