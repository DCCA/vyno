name: Security

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scanners
        run: |
          python -m pip install --upgrade pip
          pip install detect-secrets bandit semgrep ruff

      - name: Detect new secrets
        run: git ls-files | grep -v '^\.secrets\.baseline$' | xargs detect-secrets-hook --baseline .secrets.baseline

      - name: Bandit high-severity scan
        run: bandit -q -r src -lll

      - name: Ruff lint
        run: ruff check src tests

      - name: Semgrep advisory scan
        run: semgrep scan --config p/secrets --config p/python --exclude .venv --exclude web/node_modules src tests
